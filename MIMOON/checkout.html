<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Checkout — Mimoon Fashion</title>
<meta name="theme-color" content="#1a1a1a"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f8f6f2;--dark:#1a1a1a;--gold:#d4a853;--rose:#e05c6a;--green:#2d9e6b;--s900:#1c1917;--s700:#44403c;--s500:#78716c;--s400:#a8a29e;--s50:#fafaf9;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--s900);}
header{background:var(--dark);padding:16px;padding-top:calc(16px + var(--safe-top));display:flex;align-items:center;gap:14px;}
header h1{font-family:'Playfair Display',serif;font-size:20px;color:#fff;flex:1;}
header h1 span{color:var(--gold);}
.back-btn{background:#2a2a2a;color:#fff;border:none;padding:8px 14px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;text-decoration:none;display:inline-block;}
.wrap{max-width:700px;margin:0 auto;padding:24px 16px 80px;}
.section{background:#fff;border-radius:18px;padding:20px;margin-bottom:16px;border:1px solid #eee;}
.section h2{font-family:'Playfair Display',serif;font-size:17px;margin-bottom:16px;}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.fg label{font-size:10px;font-weight:700;color:var(--s500);text-transform:uppercase;letter-spacing:1.5px;}
.fg input,.fg select{font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 12px;border:1px solid #e0ddd9;border-radius:10px;outline:none;background:#fff;color:var(--s900);}
.fg input:focus,.fg select:focus{border-color:var(--gold);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.order-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f0ede8;}
.order-item:last-child{border-bottom:none;}
.oi-emoji{font-size:28px;width:44px;height:44px;background:var(--s50);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
.oi-emoji img{width:100%;height:100%;object-fit:cover;}
.oi-info{flex:1;}
.oi-name{font-size:13px;font-weight:600;}
.oi-brand{font-size:11px;color:var(--s400);}
.oi-price{font-size:13px;font-weight:700;}
.total-row{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;color:var(--s500);}
.total-row.grand{font-size:16px;font-weight:700;color:var(--s900);border-top:2px solid #eee;margin-top:8px;padding-top:12px;}
.pay-btn{width:100%;padding:14px;background:var(--gold);color:#000;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;border:none;border-radius:13px;cursor:pointer;margin-top:8px;}
.wa-btn{width:100%;padding:14px;background:#25D366;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;border:none;border-radius:13px;cursor:pointer;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px;}
.empty-cart{text-align:center;padding:60px 20px;color:var(--s400);}
.empty-cart h3{font-size:16px;font-weight:600;color:var(--s700);margin-top:12px;}
@media(max-width:500px){.grid2{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header>
  <a href="index.html" class="back-btn">← Back</a>
  <h1>Checkout <span>💳</span></h1>
</header>
<div class="wrap">
  <div id="cartSection"></div>
  <div id="formSection" style="display:none;">
    <div class="section">
      <h2>📦 Shipping Details</h2>
      <div class="fg"><label>Full Name *</label><input type="text" id="cName" placeholder="Your full name"/></div>
      <div class="fg"><label>Email *</label><input type="email" id="cEmail" placeholder="your@email.com"/></div>
      <div class="fg"><label>Phone</label><input type="tel" id="cPhone" placeholder="+1 234 567 8900"/></div>
      <div class="fg"><label>Address *</label><input type="text" id="cAddr" placeholder="Street address"/></div>
      <div class="grid2">
        <div class="fg"><label>City *</label><input type="text" id="cCity" placeholder="City"/></div>
        <div class="fg"><label>Postal Code</label><input type="text" id="cZip" placeholder="12345"/></div>
      </div>
      <div class="fg"><label>Country *</label>
        <select id="cCountry">
          <option value="">Select country…</option>
          <option>United States</option><option>Nepal</option><option>United Kingdom</option>
          <option>Canada</option><option>Australia</option><option>India</option>
          <option>UAE</option><option>Other</option>
        </select>
      </div>
    </div>
    <div class="section">
      <h2>💳 Payment</h2>
      <div class="fg"><label>Card Number</label><input type="text" id="cCard" placeholder="1234 5678 9012 3456" maxlength="19"/></div>
      <div class="grid2">
        <div class="fg"><label>Expiry</label><input type="text" id="cExp" placeholder="MM/YY" maxlength="5"/></div>
        <div class="fg"><label>CVV</label><input type="text" id="cCvv" placeholder="123" maxlength="4"/></div>
      </div>
      <button class="pay-btn" onclick="placeOrder()">🔒 Place Order</button>
      <button class="wa-btn" onclick="orderViaWhatsApp()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Order via WhatsApp
      </button>
    </div>
  </div>
</div>
<script>
const SS='drape_settings_v1';
let settings={waUS:'+18049415195',waNP:'+9779867067872',currency:'$',storeName:'Mimoon Fashion'};
try{const s=localStorage.getItem(SS);if(s)settings={...settings,...JSON.parse(s)};}catch(e){}
const cur=settings.currency||'$';

let cart=[];
try{const c=sessionStorage.getItem('drape_checkout_cart')||localStorage.getItem('drape_cart');if(c)cart=JSON.parse(c);}catch(e){}

function renderCart(){
  const sec=document.getElementById('cartSection');
  const form=document.getElementById('formSection');
  if(!cart.length){
    sec.innerHTML=`<div class="empty-cart"><div style="font-size:48px">🛍️</div><h3>Your bag is empty</h3><p style="margin-top:8px;font-size:13px;color:var(--s400)">Go back and add some items!</p><a href="index.html" style="display:inline-block;margin-top:16px;padding:12px 24px;background:var(--gold);color:#000;border-radius:12px;font-weight:700;text-decoration:none;">← Continue Shopping</a></div>`;
    return;
  }
  form.style.display='block';
  const subtotal=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const shipping=subtotal>100?0:9.99;
  const total=subtotal+shipping;
  sec.innerHTML=`<div class="section"><h2>🛍️ Your Order (${cart.reduce((s,i)=>s+i.qty,0)} items)</h2>
    ${cart.map(i=>`<div class="order-item">
      <div class="oi-emoji">${i.photo?`<img src="${i.photo}" alt="${i.name}"/>`:i.emoji||'🛍️'}</div>
      <div class="oi-info"><div class="oi-name">${i.name}</div><div class="oi-brand">${i.brand} × ${i.qty}</div></div>
      <div class="oi-price">${cur}${(i.price*i.qty).toFixed(2)}</div>
    </div>`).join('')}
    <div class="total-row"><span>Subtotal</span><span>${cur}${subtotal.toFixed(2)}</span></div>
    <div class="total-row"><span>Shipping</span><span>${shipping===0?'Free':cur+shipping.toFixed(2)}</span></div>
    <div class="total-row grand"><span>Total</span><span>${cur}${total.toFixed(2)}</span></div>
  </div>`;
}

function placeOrder(){
  const name=document.getElementById('cName').value.trim();
  const email=document.getElementById('cEmail').value.trim();
  const addr=document.getElementById('cAddr').value.trim();
  const city=document.getElementById('cCity').value.trim();
  const country=document.getElementById('cCountry').value;
  if(!name||!email||!addr||!city||!country){alert('Please fill all required fields.');return;}
  alert('✅ Order placed! Thank you '+name+'. We will contact you at '+email+' shortly.');
  localStorage.removeItem('drape_cart');
  sessionStorage.removeItem('drape_checkout_cart');
  window.location.href='index.html';
}

function orderViaWhatsApp(){
  const name=document.getElementById('cName').value.trim()||'Customer';
  const items=cart.map(i=>`• ${i.name} x${i.qty} = ${cur}${(i.price*i.qty).toFixed(2)}`).join('\n');
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const msg=`Hello! I'd like to place an order from ${settings.storeName}:\n\n${items}\n\nTotal: ${cur}${total.toFixed(2)}\n\nName: ${name}`;
  const waNum=(settings.waUS||'').replace(/[^0-9]/g,'');
  window.open('https://wa.me/'+waNum+'?text='+encodeURIComponent(msg),'_blank');
}

renderCart();
</script>
</body>
</html>
